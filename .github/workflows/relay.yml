name: relay

on:
  schedule:
    - cron: "23 * * * *"     # hourly (offset off :00; GitHub cron is best-effort)
  workflow_dispatch: {}       # lets you run it manually from the Actions tab

concurrency:
  group: relay
  cancel-in-progress: false

permissions:
  contents: write             # to commit the de-dupe ledger back

jobs:
  catchup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Catch up new links -> Bluesky + Semble
        env:
          # secrets
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          ATPROTO_APP_PASSWORD: ${{ secrets.ATPROTO_APP_PASSWORD }}
          SEMBLE_API_KEY: ${{ secrets.SEMBLE_API_KEY }}
          # non-secret config
          ATPROTO_HANDLE: colab-links.bsky.social
          ATPROTO_PDS: https://bsky.social
          SEMBLE_COLLECTION_IDS: 065840e8-3d9c-4d1b-9f98-c200218a74ed
          DISCORD_CHANNEL_MATCH: papers-links-n-sharing
        run: |
          python backfill.py --run both --since-days 30 \
            --exclude-substr "making the links shared outside of discord"

      - name: Persist de-dupe ledger
        run: |
          git config user.name "relay-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backfill_done.json
          git diff --staged --quiet || git commit -m "update ledger [skip ci]"
          git push

      - name: Notify Discord on failure
        if: failure()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ github.token }}
        run: |
          [ -z "$WEBHOOK" ] && { echo "no DISCORD_WEBHOOK_URL secret; skipping ping"; exit 0; }
          # De-dupe: only alert on a NEW failure. If the previous completed run also
          # failed, we've already pinged — stay quiet to avoid hourly alert spam.
          prev=$(gh run list -R "$GITHUB_REPOSITORY" --workflow relay.yml --status completed \
                   --limit 1 --json conclusion -q '.[0].conclusion' 2>/dev/null || echo "")
          if [ "$prev" = "failure" ]; then echo "prev run already failed; skipping repeat ping"; exit 0; fi
          MSG=$(printf '⚠️ **relay** run failed — links may not have posted this cycle.\n**repo:** %s\n**run:** %s\nLikely causes: expired Discord/Bluesky/Semble credential, or a change in Semble'"'"'s alpha API.' \
            "$GITHUB_REPOSITORY" "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID")
          jq -n --arg c "$MSG" '{username:"ATProto-links-bot CI", content:$c}' \
            | curl -sf -H "Content-Type: application/json" -X POST "$WEBHOOK" -d @-
